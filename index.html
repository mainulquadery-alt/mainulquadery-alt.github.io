<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NEON ARCADE</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 font-size=%2280%22>%F0%9F%95%B9%EF%B8%8F</svg>">
<style>
:root{
  --cyan:#00f0ff; --pink:#ff2bd6; --green:#00ff9d; --yellow:#ffe600; --purple:#a855f7; --orange:#ff7a18;
  --bg:#05040f; --panel:#0d0b1f; --panel2:#12102a;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:#e8e8ff;font-family:'Segoe UI',system-ui,sans-serif;height:100%;overscroll-behavior:none;}
body{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;}
.glow-text{text-shadow:0 0 8px currentColor,0 0 18px currentColor;}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));background:rgba(8,6,20,.95);border-bottom:3px solid var(--pink);box-shadow:0 0 25px rgba(255,43,214,.4);position:sticky;top:0;z-index:50;}
.logo{font-size:1.3rem;font-weight:900;letter-spacing:2px;color:#fff;text-shadow:0 0 10px var(--cyan),0 0 22px var(--pink);}
.logo span{color:var(--green);}
.owner{font-size:.62rem;color:#8899cc;letter-spacing:1px;margin-top:2px;}
.hdr-btns{display:flex;gap:8px;align-items:center;}
.icon-btn{background:rgba(255,255,255,.05);border:2px solid var(--purple);color:#fff;font-size:1.1rem;width:40px;height:40px;border-radius:10px;display:grid;place-items:center;cursor:pointer;}
.icon-btn:active{transform:scale(.92);}
#back-btn{display:none;}
main{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding-bottom:max(16px,env(safe-area-inset-bottom));}

/* HOME */
#home-screen{padding:16px;max-width:900px;margin:0 auto;width:100%;}
.hero{text-align:center;margin-bottom:18px;}
.hero h1{font-size:1.1rem;color:var(--cyan);margin:4px 0;}
.hero p{font-size:.75rem;color:#99aacc;margin:0;}
.xp-bar-wrap{max-width:320px;margin:10px auto 0;background:#000;border:2px solid var(--purple);border-radius:20px;height:14px;overflow:hidden;position:relative;}
.xp-bar{height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));transition:width .4s;}
.xp-label{font-size:.65rem;color:#cbb8ff;margin-top:4px;}

#game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.game-card{position:relative;background:linear-gradient(160deg,var(--panel2),var(--panel));border:2px solid var(--card-color,var(--cyan));border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;box-shadow:0 0 14px var(--card-glow,rgba(0,240,255,.25));transition:transform .15s;}
.game-card:active{transform:scale(.94);}
.card-icon{font-size:2.1rem;display:block;filter:drop-shadow(0 0 8px var(--card-glow,rgba(0,240,255,.5)));}
.card-name{font-size:.78rem;font-weight:700;margin-top:8px;}
.card-tag{font-size:.6rem;color:#8899bb;margin-top:2px;}
.card-badge{position:absolute;top:6px;right:6px;background:var(--orange);color:#000;font-size:.55rem;font-weight:800;padding:2px 6px;border-radius:6px;display:none;}
.card-best{position:absolute;top:6px;left:6px;font-size:.6rem;font-weight:800;display:none;}

.panel{background:var(--panel);border:2px solid #2a2550;border-radius:14px;padding:14px;margin-bottom:14px;}
.panel h3{margin:0 0 10px;font-size:.85rem;color:#fff;}
.lb-row{display:flex;justify-content:space-between;font-size:.75rem;padding:6px 0;border-bottom:1px solid #201c40;}
.lb-row:last-child{border:none;}
.lb-game{color:#cfd6ff;}
.lb-score{font-weight:800;color:var(--green);}

#ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px;}
.ach{background:var(--panel2);border:2px solid #2a2550;border-radius:12px;padding:8px 4px;text-align:center;opacity:.35;filter:grayscale(1);}
.ach.unlocked{opacity:1;filter:none;border-color:var(--yellow);box-shadow:0 0 12px rgba(255,230,0,.35);}
.ach-icon{font-size:1.4rem;}
.ach-name{font-size:.55rem;margin-top:4px;color:#ddd;}

/* GAME SCREEN */
#game-screen{display:none;flex-direction:column;align-items:center;padding:12px;max-width:820px;margin:0 auto;width:100%;flex:1;}
.game-head{width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:.85rem;color:var(--cyan);}
#game-stats{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;}
.stat{background:#000;border:2px solid var(--purple);border-radius:10px;padding:6px 14px;text-align:center;min-width:70px;}
.stat-label{font-size:.55rem;color:#a99bff;}
.stat-val{font-size:1.1rem;font-weight:800;color:#fff;}
#game-body{width:100%;display:flex;justify-content:center;align-items:center;touch-action:none;}
#game-controls{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;align-items:center;}
.btn{font-family:inherit;font-weight:700;font-size:.8rem;padding:12px 20px;border-radius:10px;border:2px solid var(--cyan);background:transparent;color:var(--cyan);cursor:pointer;}
.btn-primary{border-color:var(--green);color:var(--green);box-shadow:0 0 14px rgba(0,255,157,.3);}
.btn:active{transform:scale(.95);}
.hint{font-size:.68rem;color:#8899bb;text-align:center;width:100%;}
canvas{background:#05040f;border-radius:10px;max-width:100%;height:auto;touch-action:none;}

/* dpad for mobile */
.dpad{display:grid;grid-template-columns:repeat(3,54px);grid-template-rows:repeat(3,54px);gap:4px;margin-top:6px;}
.dpad button{padding:0;font-size:1.2rem;border-radius:10px;}
.dpad .empty{visibility:hidden;}

.grid-2048{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:min(92vw,340px);background:#1a1a30;padding:8px;border-radius:10px;}
.tile-2048{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-weight:800;border-radius:8px;transition:.1s;}
.ttt-board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:min(80vw,300px);}
.ttt-cell{aspect-ratio:1;background:#141230;border:2px solid #2a2550;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;font-weight:900;cursor:pointer;}
.ttt-cell.x{color:var(--green);}
.ttt-cell.o{color:var(--pink);}
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:min(92vw,360px);}
.mem-card{aspect-ratio:1;perspective:600px;cursor:pointer;}
.mem-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:.35s;}
.mem-card.flipped .mem-inner{transform:rotateY(180deg);}
.mem-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;}
.mem-front{background:linear-gradient(160deg,#2a2550,#141230);border:2px solid var(--purple);}
.mem-back{background:#141230;border:2px solid var(--cyan);transform:rotateY(180deg);}
.reaction-area{width:min(90vw,420px);height:260px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;color:#fff;text-align:center;transition:.15s;cursor:pointer;}
.mole-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:min(92vw,340px);}
.mole-hole{aspect-ratio:1;background:radial-gradient(circle at 50% 60%,#1a1a30,#050410);border-radius:50%;border:3px solid #2a2550;display:flex;align-items:center;justify-content:center;font-size:2rem;cursor:pointer;overflow:hidden;}
.mole-hole.up{border-color:var(--green);box-shadow:0 0 16px rgba(0,255,157,.4);}

.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#000;border:2px solid var(--yellow);color:var(--yellow);padding:10px 18px;border-radius:10px;font-size:.8rem;font-weight:700;opacity:0;pointer-events:none;transition:.3s;z-index:200;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.modal-overlay{position:fixed;inset:0;background:rgba(2,1,10,.88);display:none;align-items:flex-start;justify-content:center;z-index:300;overflow-y:auto;padding:20px 12px;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--panel);border:2px solid var(--purple);border-radius:16px;padding:18px;max-width:520px;width:100%;margin-top:20px;}
.modal-box h3{margin-top:0;color:#fff;}
.modal-close{float:right;background:none;border:none;color:#fff;font-size:1.3rem;cursor:pointer;}

footer{text-align:center;font-size:.6rem;color:#445577;padding:10px;border-top:1px solid #1a1a2e;}
</style>
</head>
<body>
<header>
  <div>
    <div class="logo"><span>◆</span> NEON ARCADE</div>
    <div class="owner">by Mainul Quadery</div>
  </div>
  <div class="hdr-btns">
    <button class="icon-btn" id="back-btn" onclick="Arcade.goHome()">←</button>
    <button class="icon-btn" id="ach-btn" onclick="Arcade.openAchievements()">🏅</button>
    <button class="icon-btn" id="sound-btn" onclick="Arcade.toggleSound()">🔊</button>
  </div>
</header>

<main>
  <div id="home-screen">
    <div class="hero">
      <h1 class="glow-text" style="color:var(--pink)">LEVEL <span id="level-num">1</span></h1>
      <p id="xp-label" class="xp-label">0 / 100 XP</p>
      <div class="xp-bar-wrap"><div class="xp-bar" id="xp-bar" style="width:0%"></div></div>
    </div>
    <div id="game-grid"></div>
    <div class="panel" id="leaderboard"></div>
  </div>

  <div id="game-screen">
    <div class="game-head">
      <span id="game-title"></span>
    </div>
    <div id="game-stats"></div>
    <div id="game-body"></div>
    <div id="game-controls"></div>
  </div>
</main>

<footer>Neon Arcade &middot; tap a game to play &middot; scores &amp; achievements saved on this device</footer>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="ach-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="Arcade.closeAchievements()">✕</button>
    <h3>🏅 Achievements</h3>
    <div id="ach-grid"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
