<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neon Arcade</title>
<style>
  :root{
    --neon-cyan:#00f0ff; --neon-magenta:#ff2bd6; --neon-purple:#a855f7;
    --neon-green:#00ff9d; --neon-yellow:#ffe600; --neon-orange:#ff7a18;
    --bg:#070712; --panel:#0f0f24; --panel2:#15152e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:#e8e8ff;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
    background-image:
      radial-gradient(circle at 20% 10%,rgba(168,85,247,.12),transparent 40%),
      radial-gradient(circle at 80% 80%,rgba(0,240,255,.10),transparent 40%),
      linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
    background-size:100% 100%,100% 100%,40px 40px,40px 40px;
    min-height:100vh;
  }
  .glow-text{text-shadow:0 0 8px currentColor,0 0 20px currentColor}
  .neon-border{border:1px solid var(--neon-cyan);box-shadow:0 0 12px rgba(0,240,255,.4),inset 0 0 12px rgba(0,240,255,.08)}
  #app{max-width:980px;margin:0 auto;padding:16px}

  /* Top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:10px;cursor:pointer}
  .logo-badge{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:22px;
    background:linear-gradient(135deg,var(--neon-purple),var(--neon-magenta));
    box-shadow:0 0 18px rgba(255,43,214,.5)}
  .logo h1{font-size:1.5rem;font-weight:800;letter-spacing:1px;
    background:linear-gradient(90deg,var(--neon-cyan),var(--neon-magenta));-webkit-background-clip:text;background-clip:text;color:transparent}
  .topbar-right{display:flex;align-items:center;gap:8px}
  .pill{padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:700;border:1px solid var(--panel2);background:var(--panel);color:#aab}
  .icon-btn{width:40px;height:40px;border-radius:10px;border:1px solid var(--panel2);background:var(--panel);color:#aab;
    cursor:pointer;font-size:18px;display:grid;place-items:center;transition:.2s}
  .icon-btn:hover{border-color:var(--neon-cyan);color:var(--neon-cyan);box-shadow:0 0 12px rgba(0,240,255,.3)}
  .back-btn{display:none;align-items:center;gap:6px}

  /* Home */
  .hero{text-align:center;margin-bottom:20px}
  .hero h2{font-size:1.7rem;font-weight:800;letter-spacing:.5px;margin-bottom:4px;
    background:linear-gradient(90deg,var(--neon-cyan),var(--neon-green),var(--neon-magenta));-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{color:#889;font-size:.85rem}
  .game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
  .game-card{position:relative;border-radius:16px;padding:22px 16px;cursor:pointer;overflow:hidden;
    background:var(--panel);border:1px solid var(--panel2);transition:.25s;text-align:center}
  .game-card::before{content:"";position:absolute;inset:0;opacity:0;transition:.3s;
    background:radial-gradient(circle at 50% 0%,var(--card-glow,rgba(0,240,255,.25)),transparent 70%)}
  .game-card:hover{transform:translateY(-4px);border-color:var(--card-color,var(--neon-cyan));
    box-shadow:0 8px 30px rgba(0,0,0,.5),0 0 20px var(--card-glow,rgba(0,240,255,.3))}
  .game-card:hover::before{opacity:1}
  .card-icon{font-size:2.6rem;margin-bottom:10px;display:block;filter:drop-shadow(0 0 8px var(--card-glow,rgba(0,240,255,.5)))}
  .card-name{font-weight:800;font-size:.95rem;margin-bottom:3px}
  .card-tag{font-size:.68rem;color:#778;text-transform:uppercase;letter-spacing:1px}
  .card-best{position:absolute;top:10px;right:10px;font-size:.62rem;font-weight:700;color:var(--card-color,var(--neon-cyan));
    background:rgba(0,0,0,.3);padding:2px 7px;border-radius:8px;display:none}
  .card-badge{position:absolute;top:10px;left:10px;font-size:.58rem;font-weight:800;color:#000;
    background:var(--neon-yellow);padding:2px 6px;border-radius:6px;letter-spacing:.5px;display:none}

  /* Game screen */
  #game-screen{display:none}
  .game-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .game-title{font-size:1.3rem;font-weight:800;display:flex;align-items:center;gap:8px}
  .game-stats{display:flex;gap:10px;flex-wrap:wrap}
  .stat{background:var(--panel);border:1px solid var(--panel2);border-radius:10px;padding:6px 14px;text-align:center}
  .stat-label{font-size:.6rem;color:#778;text-transform:uppercase;letter-spacing:1px}
  .stat-val{font-size:1.15rem;font-weight:800;color:var(--neon-cyan)}
  .game-body{display:flex;flex-direction:column;align-items:center;gap:12px}
  .game-controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .btn{padding:9px 22px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:.85rem;transition:.2s;color:#fff}
  .btn-primary{background:linear-gradient(90deg,var(--neon-purple),var(--neon-magenta));box-shadow:0 0 14px rgba(168,85,247,.4)}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 0 22px rgba(168,85,247,.6)}
  .btn-ghost{background:var(--panel);border:1px solid var(--panel2);color:#aab}
  .btn-ghost:hover{border-color:var(--neon-cyan);color:var(--neon-cyan)}
  .hint{font-size:.75rem;color:#778;text-align:center}

  canvas{display:block;border-radius:14px;background:#0a0a18;box-shadow:0 0 25px rgba(0,240,255,.15)}
  .game-overlay{position:relative}

  /* 2048 & memory & ttt */
  .grid-2048{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px;background:#0a0a18;border-radius:14px;
    width:440px;aspect-ratio:1;box-shadow:0 0 25px rgba(0,240,255,.15)}
  .tile-2048{display:grid;place-items:center;border-radius:8px;font-weight:800;font-size:1.4rem;transition:.1s;color:#fff}
  .ttt-board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:400px;aspect-ratio:1;background:#0a0a18;
    padding:6px;border-radius:14px;box-shadow:0 0 25px rgba(0,240,255,.15)}
  .ttt-cell{background:var(--panel);border-radius:8px;display:grid;place-items:center;font-size:2.2rem;font-weight:800;
    cursor:pointer;transition:.15s;border:1px solid var(--panel2)}
  .ttt-cell:hover{border-color:var(--neon-cyan)}
  .ttt-cell.x{color:var(--neon-cyan);text-shadow:0 0 12px var(--neon-cyan)}
  .ttt-cell.o{color:var(--neon-magenta);text-shadow:0 0 12px var(--neon-magenta)}
  .mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:440px}
  .mem-card{aspect-ratio:1;border-radius:10px;cursor:pointer;position:relative;perspective:600px;transition:.3s}
  .mem-inner{position:absolute;inset:0;transition:transform .4s;transform-style:preserve-3d}
  .mem-card.flipped .mem-inner{transform:rotateY(180deg)}
  .mem-face{position:absolute;inset:0;border-radius:10px;display:grid;place-items:center;backface-visibility:hidden;font-size:1.8rem}
  .mem-front{background:linear-gradient(135deg,var(--neon-purple),#2a1a4a);border:1px solid var(--neon-purple)}
  .mem-front::after{content:"?";font-size:1.4rem;color:rgba(255,255,255,.4)}
  .mem-back{background:var(--panel);border:1px solid var(--neon-cyan);transform:rotateY(180deg);
    box-shadow:inset 0 0 12px rgba(0,240,255,.1)}

  .reaction-area{width:440px;height:340px;border-radius:16px;display:grid;place-items:center;cursor:pointer;
    font-size:1.3rem;font-weight:800;text-align:center;transition:background .1s;border:2px solid var(--panel2)}

  .leaderboard{margin-top:18px;background:var(--panel);border:1px solid var(--panel2);border-radius:14px;padding:16px}
  .leaderboard h3{font-size:.9rem;margin-bottom:10px;color:#aab;display:flex;align-items:center;gap:6px}
  .lb-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.82rem}
  .lb-row:last-child{border-bottom:none}
  .lb-game{color:#ccd} .lb-score{font-weight:800;color:var(--neon-green)}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--panel);
    border:1px solid var(--neon-cyan);border-radius:10px;padding:10px 20px;font-size:.85rem;font-weight:700;
    box-shadow:0 0 20px rgba(0,240,255,.4);transition:.3s;opacity:0;z-index:999;pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .footer{text-align:center;color:#556;font-size:.72rem;margin-top:20px;padding:10px}
  .hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo" onclick="Arcade.goHome()">
      <div class="logo-badge">🕹️</div>
      <h1>NEON ARCADE</h1>
    </div>
    <div class="topbar-right">
      <span class="pill" id="total-games">8 Games</span>
      <button class="icon-btn back-btn" id="back-btn" onclick="Arcade.goHome()">←</button>
      <button class="icon-btn" id="sound-btn" onclick="Arcade.toggleSound()" title="Sound">🔊</button>
    </div>
  </div>

  <!-- HOME -->
  <div id="home-screen">
    <div class="hero">
      <h2>Welcome back, Player</h2>
      <p>Pick a game · beat your best · climb the leaderboard</p>
    </div>
    <div class="game-grid" id="game-grid"></div>
    <div class="leaderboard" id="leaderboard"></div>
  </div>

  <!-- GAME -->
  <div id="game-screen">
    <div class="game-header">
      <div class="game-title" id="game-title">🎮 Game</div>
      <div class="game-stats" id="game-stats"></div>
    </div>
    <div class="game-body" id="game-body"></div>
    <div class="game-controls" id="game-controls" style="margin-top:14px"></div>
  </div>

  <div class="footer">Neon Arcade · built by Mainul Quadery · v2.0</div>
</div>
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
